server {
    server_name cyprusvipestates.com www.cyprusvipestates.com;

    # Canonical host is the non-www apex.
    if ($host = www.cyprusvipestates.com) { return 301 https://cyprusvipestates.com$request_uri; }

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;


    client_max_body_size 50M;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml+rss image/svg+xml;

    access_log /var/log/nginx/cvp-access.log;
    error_log  /var/log/nginx/cvp-error.log;

    # English is the default locale, served WITHOUT a prefix → strip any /en (301 to clean URL).
    location = /en { return 301 /; }
    location ^~ /en/ { rewrite ^/en/(.*)$ /$1 permanent; }

    # Static assets served directly (perf)
    location ^~ /_next/static/ {
        alias /var/www/cyprusvipestates/.next/static/;
        expires 1y; add_header Cache-Control "public, immutable";
    }
    location ^~ /uploads/ {
        alias /var/www/cyprusvipestates/public/uploads/;
        expires 30d; add_header Cache-Control "public";
        access_log off;
    }

    # Infra paths → proxy (never locale-redirected)
    location ^~ /_next/   { include /etc/nginx/snippets/cvp_proxy.conf; }
    location ^~ /api/     { include /etc/nginx/snippets/cvp_proxy.conf; }
    location ^~ /admin    { add_header X-Robots-Tag "noindex, nofollow" always; include /etc/nginx/snippets/cvp_proxy.conf; }
    location ^~ /sitemaps/ { include /etc/nginx/snippets/cvp_proxy.conf; }
    location = /sitemap.xml { include /etc/nginx/snippets/cvp_proxy.conf; }
    location = /robots.txt  { include /etc/nginx/snippets/cvp_proxy.conf; }
    location = /favicon.ico { include /etc/nginx/snippets/cvp_proxy.conf; }

    # Non-default locale pages (/de, /pl, /ru and below) → proxy
    location ~ ^/(de|pl|ru)(/|$) { include /etc/nginx/snippets/cvp_proxy.conf; }

    # Everything else is an English (default-locale) bare path served by the app —
    # EXCEPT old German no-prefix URLs with no English equivalent, which 301 to /de.
    location / {
        if ($cvp_de_only) { return 301 /de$uri$is_args$args; }
        include /etc/nginx/snippets/cvp_proxy.conf;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cyprusvipestates.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cyprusvipestates.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


server {
    if ($host = www.cyprusvipestates.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = cyprusvipestates.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name cyprusvipestates.com www.cyprusvipestates.com;
    return 404; # managed by Certbot




}